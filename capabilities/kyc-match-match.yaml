naftiko: 1.0.0-alpha2
info:
  label: Global System for Mobile Communications Know Your Customer Match — Match
  description: 'Global System for Mobile Communications Know Your Customer Match — Match. 1 operations. Lead operation: Global
    System for Mobile Communications Matching a customer identity by checking a set of attributes related against the account
    data bound to their phone number.. Self-contained Naftiko capability covering one Global System For Mobile Communications
    business surface.'
  tags:
  - Global System For Mobile Communications
  - Match
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GLOBAL_SYSTEM_FOR_MOBILE_COMMUNICATIONS_API_KEY: GLOBAL_SYSTEM_FOR_MOBILE_COMMUNICATIONS_API_KEY
capability:
  consumes:
  - type: http
    namespace: kyc-match-match
    baseUri: ''
    description: Global System for Mobile Communications Know Your Customer Match — Match business capability. Self-contained,
      no shared references.
    resources:
    - name: match
      path: /match
      operations:
      - name: kycmatch
        method: POST
        description: Global System for Mobile Communications Matching a customer identity by checking a set of attributes
          related against the account data bound to their phone number.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: kyc-match-match-rest
    port: 8080
    description: REST adapter for Global System for Mobile Communications Know Your Customer Match — Match. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/match
      name: match
      description: REST surface for match.
      operations:
      - method: POST
        name: kycmatch
        description: Global System for Mobile Communications Matching a customer identity by checking a set of attributes
          related against the account data bound to their phone number.
        call: kyc-match-match.kycmatch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: kyc-match-match-mcp
    port: 9090
    transport: http
    description: MCP adapter for Global System for Mobile Communications Know Your Customer Match — Match. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: global-system-mobile-communications-matching
      description: Global System for Mobile Communications Matching a customer identity by checking a set of attributes related
        against the account data bound to their phone number.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: kyc-match-match.kycmatch
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
